  name: Weekly Jira Report

  on:
    schedule:
      - cron: '0 0 * * 4'
    workflow_dispatch:

  jobs:
    generate-report:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Install dependencies
          run: pip install requests

        - name: Generate Jira report
          env:
            JIRA_URL: pcni.atlassian.net
            JIRA_EMAIL: ahreum0824@pantechcni.com
            JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          run: python scripts/generate_jira_report.py

        - name: Commit and push
          run: |
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add reports/
            git diff --staged --quiet || git commit -m "chore: jira weekly report $(date +'%Y-%m-%d')"
            git push
